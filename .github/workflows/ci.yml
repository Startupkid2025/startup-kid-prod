name: CI

on:
  push:
    branches: [main, dev/startupkid]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          MAX_SIZE_KB=2048
          TOTAL_SIZE=$(du -sk dist/assets/ | cut -f1)
          echo "Total bundle size: ${TOTAL_SIZE}KB"
          if [ "$TOTAL_SIZE" -gt "$MAX_SIZE_KB" ]; then
            echo "::warning::Bundle size (${TOTAL_SIZE}KB) exceeds ${MAX_SIZE_KB}KB budget"
          fi
